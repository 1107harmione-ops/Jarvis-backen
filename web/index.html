<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarvis UI</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/admin.css">
</head>
<body>
    <div id="three-bg"></div>
    <div class="admin-badge" id="adminBadge" style="display:none;">🛡 ADMIN</div>
    <div class="hamburger" id="hamburgerBtn">
        <span></span><span></span><span></span>
    </div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebarPanel">
        <div class="sidebar-header">
            <span class="sidebar-title">JARVIS</span>
            <span class="sidebar-close" id="sidebarClose">&times;</span>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-section-title">LAST WORKS</div>
            <div class="sidebar-list" id="sidebarLastWorks">
                <div class="sidebar-empty">No recent tasks yet.</div>
            </div>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-section-title">SESSIONS</div>
            <div class="sidebar-list" id="sidebarSessions">
                <div class="sidebar-empty">No sessions yet.</div>
            </div>
        </div>
    </div>
    <div class="container" id="mainContainer">
        <div class="status" id="statusText">SYSTEM IDLE</div>
        <div class="center" id="voiceTrigger">
            <div class="rings">
                <div class="ring ring1"></div>
                <div class="ring ring2"></div>
            </div>
            <div class="crystal-orb" id="crystalOrb">
                <div class="crystal-highlight"></div>
                <div class="crystal-core"></div>
                <div class="crystal-facets"></div>
                <canvas id="waterParticles"></canvas>
            </div>
        </div>
        <div class="hint" id="hintText">TAP THE CRYSTAL TO ACTIVATE</div>
        <div id="chatLog" class="chat-log">
            <div id="chatMessages" class="chat-messages"></div>
            <div class="chat-input-row">
                <input type="text" id="chatInput" class="chat-input" placeholder="Type a message..." autocomplete="off">
                <button id="chatSendBtn" class="chat-send-btn">SEND</button>
            </div>
        </div>
        <div id="imageDisplay" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 100; flex-direction: column; justify-content: center; align-items: center; transition: all 0.5s ease; cursor: pointer;">
            <img id="generatedImg" src="" style="max-width: 90%; max-height: 80%; border-radius: 12px; border: 2px solid #FF6B35; box-shadow: 0 0 30px #FF6B3555;">
            <div id="imagePath" style="margin-top: 15px; color: #FF6B35; font-family: 'Space Grotesk', monospace; font-size: 14px; text-shadow: 0 0 10px #FF6B35;"></div>
            <div style="margin-top: 10px; color: #fff; font-size: 12px;">TAP TO CLOSE</div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
    // ─── Three.js Fusion Background ─────────────────────────
    (function(){
        const bg = document.getElementById('three-bg');
        if (!bg) return;
        const W = window.innerWidth, H = window.innerHeight;
        const sc = new THREE.Scene();
        sc.fog = new THREE.FogExp2(0x050200, 0.0015);
        const cm = new THREE.PerspectiveCamera(50, W/H, 1, 2000);
        cm.position.set(0, 80, 520);
        const rd = new THREE.WebGLRenderer({
            antialias: true,
            alpha: true,
            powerPreference: 'high-performance',
            logarithmicDepthBuffer: true
        });
        rd.setSize(W, H);
        rd.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        rd.setClearColor(0x050200, 0);
        bg.appendChild(rd.domElement);
        rd.domElement.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;';

        // ── Radial gradient texture for particles ──
        function makeTex(c1, c2) {
            const cv = document.createElement('canvas');
            cv.width = cv.height = 48;
            const g = cv.getContext('2d').createRadialGradient(24, 24, 0, 24, 24, 24);
            g.addColorStop(0, c1);
            g.addColorStop(0.12, c1);
            g.addColorStop(0.4, c2);
            g.addColorStop(1, 'rgba(0,0,0,0)');
            const x = cv.getContext('2d');
            x.fillStyle = g;
            x.fillRect(0, 0, 48, 48);
            const t = new THREE.CanvasTexture(cv);
            t.generateMipmaps = t.minFilter = 1008;
            return t;
        }

        // ── Fusion colour palette ──
        const C_GOLD     = '#FFD700';
        const C_ORANGE   = '#FF6B35';
        const C_REDORANGE= '#FF4500';
        const C_AMBER    = '#FFBF00';
        const C_WARMW    = '#FFE4B5';
        const C_CORAL    = '#FF7F50';
        const C_DARK     = 'rgba(200,60,0,0.9)';

        // ── Galaxy / neural net ──
        const N = 800, gM = new THREE.Group();
        const nPos = new Float32Array(N * 3);
        const nGeo = new THREE.BufferGeometry();
        sc.add(gM);
        nGeo.setAttribute('position', new THREE.BufferAttribute(nPos, 3));
        const pMat = new THREE.PointsMaterial({
            size: 7,
            sizeAttenuation: true,
            map: makeTex(C_WARMW, C_DARK),
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        gM.add(new THREE.Points(nGeo, pMat));

        const nds = [], T = 30, wP = [], wB = [];
        for (let i = 0; i < N; i++) {
            const u = Math.random(), v = Math.random();
            const th = u * 2 * Math.PI, ph = Math.acos(2 * v - 1);
            const r = 90 + Math.random() * 40;
            const x = r * Math.sin(ph) * Math.cos(th);
            const y = r * Math.sin(ph) * Math.sin(th);
            const z = r * Math.cos(ph);
            nPos[i*3] = x; nPos[i*3+1] = y; nPos[i*3+2] = z;
            nds.push({
                id: i, homeX: x, homeY: y, homeZ: z,
                x, y, z, isTr: false, tgt: null, prg: 0,
                sp: 0.004 + Math.random() * 0.006
            });
        }
        nGeo.attributes.position.needsUpdate = true;

        // ── Connection lines ──
        for (let i = 0; i < N; i++) {
            for (let j = i + 1; j < N; j++) {
                const dx = nds[i].x - nds[j].x, dy = nds[i].y - nds[j].y, dz = nds[i].z - nds[j].z;
                const d = Math.sqrt(dx*dx + dy*dy + dz*dz);
                if (d < T) {
                    wB.push(nds[i].x, nds[i].y, nds[i].z, nds[j].x, nds[j].y, nds[j].z);
                    wP.push({
                        p1: i, j1: j,
                        mx: (nds[i].x + nds[j].x) / 2,
                        my: (nds[i].y + nds[j].y) / 2,
                        mz: (nds[i].z + nds[j].z) / 2
                    });
                }
            }
        }
        const wG = new THREE.BufferGeometry();
        wG.setAttribute('position', new THREE.Float32BufferAttribute(wB, 3));
        gM.add(new THREE.LineSegments(wG, new THREE.LineBasicMaterial({
            color: 0xFF6B35,
            transparent: true,
            opacity: 0.18,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        })));

        // ── Background star field ──
        const S = 1500, sP = new Float32Array(S * 3);
        const sV = new Float32Array(S * 3);
        const sA = new Float32Array(S);
        const sC = new Float32Array(S * 3);
        const sG = new THREE.BufferGeometry();
        let sH = 0;
        sG.setAttribute('position', new THREE.BufferAttribute(sP, 3));
        sG.setAttribute('color', new THREE.BufferAttribute(sC, 3));
        sc.add(new THREE.Points(sG, new THREE.PointsMaterial({
            size: 4.5,
            sizeAttenuation: true,
            map: makeTex(C_WARMW, C_DARK),
            transparent: true,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        })));

        function blast(x, y, z, ty) {
            const c = ty === 'collision' ? 25 : 10;
            const f = ty === 'collision' ? () => 1.2 + Math.random() * 2.0 : () => 0.8 + Math.random() * 1.2;
            for (let k = 0; k < c; k++) {
                const id = sH % S, p = id * 3;
                sP[p] = x; sP[p+1] = y; sP[p+2] = z;
                const u = Math.random(), v = Math.random();
                const th = u * 2 * Math.PI, ph = Math.acos(2 * v - 1), spd = f();
                sV[p] = spd * Math.sin(ph) * Math.cos(th);
                sV[p+1] = spd * Math.sin(ph) * Math.sin(th);
                sV[p+2] = spd * Math.cos(ph);
                // Fusion colours for blasts
                if (ty === 'collision') {
                    sC[p] = 1.0; sC[p+1] = 0.45; sC[p+2] = 0.1;  // gold-orange
                } else {
                    sC[p] = 1.0; sC[p+1] = 0.7; sC[p+2] = 0.2;   // warm gold
                }
                sA[id] = 1;
                sH++;
            }
        }

        // ── Animation loop ──
        const cl = new THREE.Clock();
        function anim() {
            requestAnimationFrame(anim);
            const t = cl.getElapsedTime();
            const pA = nGeo.attributes.position.array;

            gM.rotation.y = t * 0.018;
            gM.rotation.x = Math.sin(t * 0.008) * 0.05;
            cm.position.x = Math.sin(t * 0.04) * 30;
            cm.position.y = 70 + Math.cos(t * 0.025) * 10;
            cm.lookAt(0, 0, 0);

            // Trigger node travel
            if (Math.random() < 0.10) {
                const av = nds.filter(n => !n.isTr);
                if (av.length > 5) {
                    const p = av[Math.floor(Math.random() * av.length)];
                    const g = av[Math.floor(Math.random() * av.length)];
                    if (p.id !== g.id) { p.isTr = true; p.tgt = g.id; p.prg = 0; }
                }
            }
            if (Math.random() < 0.03 && wP.length > 0) {
                const l = wP[Math.floor(Math.random() * wP.length)];
                blast(l.mx, l.my, l.mz, 'sync');
            }

            // Update node positions
            for (let i = 0; i < N; i++) {
                const n = nds[i], p = i * 3;
                if (n.isTr) {
                    const g = nds[n.tgt];
                    n.prg += n.sp;
                    const e = n.prg * n.prg * (3 - 2 * n.prg);
                    pA[p]   = THREE.MathUtils.lerp(n.homeX, g ? g.x : n.homeX, e);
                    pA[p+1] = THREE.MathUtils.lerp(n.homeY, g ? g.y : n.homeY, e);
                    pA[p+2] = THREE.MathUtils.lerp(n.homeZ, g ? g.z : n.homeZ, e);
                    if (n.prg >= 1) {
                        blast(pA[p], pA[p+1], pA[p+2], 'collision');
                        n.isTr = false;
                        n.homeX = pA[p]; n.homeY = pA[p+1]; n.homeZ = pA[p+2];
                    }
                } else {
                    pA[p] = n.homeX; pA[p+1] = n.homeY; pA[p+2] = n.homeZ;
                }
            }
            nGeo.attributes.position.needsUpdate = true;

            // Update stars
            const sA_ = sG.attributes.position.array;
            for (let i = 0; i < S; i++) {
                const p = i * 3;
                sA_[p]   += sV[p];
                sA_[p+1] += sV[p+1];
                sA_[p+2] += sV[p+2];
                sV[p]   *= 0.94;
                sV[p+1] *= 0.94;
                sV[p+2] *= 0.94;
                if (sA[i] > 0) {
                    sA[i] -= 0.02;
                    if (sA[i] <= 0) sA_[p] = sA_[p+1] = sA_[p+2] = 9999;
                }
            }
            sG.attributes.position.needsUpdate = true;
            rd.render(sc, cm);
        }
        anim();

        window.addEventListener('resize', function() {
            const w = window.innerWidth, h = window.innerHeight;
            cm.aspect = w / h;
            cm.updateProjectionMatrix();
            rd.setSize(w, h);
        });
    })();
    </script>
    <script src="/static/script.js"></script>
    <script src="/static/admin.js"></script>
</body>
</html>
