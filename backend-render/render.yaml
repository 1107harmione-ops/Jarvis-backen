services:
  - type: web
    name: jarvis-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4
    envVars:
      - key: GROQ_CHAT_API_KEY
        sync: false
      - key: SERP_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
