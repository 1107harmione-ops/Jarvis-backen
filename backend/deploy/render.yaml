# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: jarvis-v3
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 8001
      - key: DATABASE_URL
        fromDatabase:
          name: jarvis-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: jarvis-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
    disk:
      name: jarvis-data
      mountPath: /app/data
      sizeGB: 1

databases:
  - name: jarvis-db
    databaseName: jarvis
    user: jarvis
    plan: starter

redis:
  - name: jarvis-redis
    plan: starter
